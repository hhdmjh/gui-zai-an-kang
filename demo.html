<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桂在安康 - 演示模式</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f2f7f5; }
        .navbar { background: linear-gradient(135deg, #2d8a5f, #36a88d); padding: 15px 30px; border-radius: 12px; margin: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(45, 138, 95, 0.2); }
        .navbar-brand { color: white; font-size: 24px; font-weight: bold; text-decoration: none; }
        .navbar-nav { display: flex; gap: 15px; list-style: none; }
        .nav-link { color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; background: rgba(255, 255, 255, 0.15); }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .card { background: white; border-radius: 16px; padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); }
        .card-title { color: #2d8a5f; font-size: 22px; margin-bottom: 20px; font-weight: 600; border-bottom: 3px solid #36a88d; padding-bottom: 10px; display: inline-block; }
        .btn { padding: 14px 30px; background: #2d8a5f; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: 600; }
        .btn:hover { background: #1e6b45; }
        .warning-bar { background: #fff2f0; border: 2px solid #ffccc7; padding: 20px; border-radius: 12px; margin-bottom: 25px; display: none; }
        .warning-bar.show { display: block; }
        .warning-item { background: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #cf1322; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: linear-gradient(135deg, #f0f9f4, #e6f7ef); border-radius: 12px; padding: 20px; text-align: center; border: 2px solid #d9f7be; }
        .stat-value { font-size: 32px; font-weight: bold; color: #2d8a5f; margin-bottom: 5px; }
        .stat-label { font-size: 14px; color: #666; }
        .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 25px; }
        .chart-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05); height: 350px; }
        .input-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; background: #f8f9fa; padding: 25px; border-radius: 12px; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        .form-control { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
        .form-control:focus { outline: none; border-color: #2d8a5f; box-shadow: 0 0 0 3px rgba(45, 138, 95, 0.1); }
        .demo-notice { background: #fffbe6; border: 2px solid #ffe58f; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .demo-notice strong { color: #fa8c16; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="#" class="navbar-brand">🌿 桂在安康 - 演示模式</a>
        <ul class="navbar-nav">
            <li><a href="#" class="nav-link active">健康数据</a></li>
            <li><a href="ai-report.html" class="nav-link">AI 报告</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="demo-notice">
            <strong>📌 演示模式说明：</strong>当前使用浏览器本地存储演示，无需数据库。刷新页面数据会保留。
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="statRecords">0</div>
                <div class="stat-label">总记录数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statBP">-</div>
                <div class="stat-label">平均血压</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statSugar">-</div>
                <div class="stat-label">平均血糖</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statSleep">-</div>
                <div class="stat-label">平均睡眠</div>
            </div>
        </div>

        <div class="warning-bar" id="warningBar">
            <h3 style="color: #cf1322; margin-bottom: 15px;">⚠️ 健康预警</h3>
            <div id="warningList"></div>
        </div>

        <div class="card">
            <h2 class="card-title">📝 健康数据录入</h2>
            <form class="input-form" id="dataForm">
                <div class="form-group">
                    <label class="form-label">记录日期</label>
                    <input type="date" id="recordDate" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">收缩压 (mmHg)</label>
                    <input type="number" id="systolic" class="form-control" placeholder="如：120" required>
                </div>
                <div class="form-group">
                    <label class="form-label">舒张压 (mmHg)</label>
                    <input type="number" id="diastolic" class="form-control" placeholder="如：80" required>
                </div>
                <div class="form-group">
                    <label class="form-label">空腹血糖 (mmol/L)</label>
                    <input type="number" id="bloodSugar" class="form-control" placeholder="如：5.6" step="0.1" required>
                </div>
                <div class="form-group">
                    <label class="form-label">睡眠时长 (小时)</label>
                    <input type="number" id="sleep" class="form-control" placeholder="如：7" step="0.5" required>
                </div>
                <div class="form-group">
                    <label class="form-label">体重 (斤)</label>
                    <input type="number" id="weight" class="form-control" placeholder="如：101" step="0.1" required>
                </div>
                <div class="form-group">
                    <label class="form-label">运动时长 (分钟)</label>
                    <input type="number" id="sport" class="form-control" placeholder="如：40" required>
                </div>
                <button type="submit" class="btn">✅ 提交数据</button>
            </form>
        </div>

        <div class="card">
            <h2 class="card-title">📊 健康数据趋势分析</h2>
            <div class="chart-grid">
                <div id="bpChart" class="chart-card"></div>
                <div id="bsChart" class="chart-card"></div>
                <div id="weightChart" class="chart-card"></div>
                <div id="sleepChart" class="chart-card"></div>
                <div id="sportChart" class="chart-card"></div>
            </div>
        </div>
    </div>

    <script>
        let healthData = JSON.parse(localStorage.getItem('demoHealthData')) || [];
        let charts = {};

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('recordDate').valueAsDate = new Date();
            loadDemoData();
            initCharts();
            updateCharts();
            updateStatistics();
            updateWarning();
        });

        function loadDemoData() {
            if (healthData.length === 0) {
                healthData = [
                    { date: '2024-01-01', systolic: 118, diastolic: 78, bloodSugar: 5.4, sleep: 7.5, weight: 105, sport: 45 },
                    { date: '2024-01-02', systolic: 120, diastolic: 80, bloodSugar: 5.6, sleep: 7.0, weight: 105, sport: 30 },
                    { date: '2024-01-03', systolic: 122, diastolic: 82, bloodSugar: 5.8, sleep: 8.0, weight: 106, sport: 60 },
                    { date: '2024-01-04', systolic: 119, diastolic: 79, bloodSugar: 5.5, sleep: 7.2, weight: 105, sport: 40 },
                    { date: '2024-01-05', systolic: 121, diastolic: 81, bloodSugar: 5.7, sleep: 6.8, weight: 106, sport: 35 }
                ];
                localStorage.setItem('demoHealthData', JSON.stringify(healthData));
            }
        }

        document.getElementById('dataForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const newData = {
                date: document.getElementById('recordDate').value,
                systolic: parseFloat(document.getElementById('systolic').value),
                diastolic: parseFloat(document.getElementById('diastolic').value),
                bloodSugar: parseFloat(document.getElementById('bloodSugar').value),
                sleep: parseFloat(document.getElementById('sleep').value),
                weight: parseFloat(document.getElementById('weight').value),
                sport: parseInt(document.getElementById('sport').value)
            };
            
            const existingIndex = healthData.findIndex(d => d.date === newData.date);
            if (existingIndex >= 0) {
                if (confirm('该日期已有数据，是否覆盖？')) {
                    healthData[existingIndex] = newData;
                } else {
                    return;
                }
            } else {
                healthData.push(newData);
            }
            
            localStorage.setItem('demoHealthData', JSON.stringify(healthData));
            updateCharts();
            updateStatistics();
            updateWarning();
            alert('✅ 数据提交成功！');
            this.reset();
            document.getElementById('recordDate').valueAsDate = new Date();
        });

        function updateCharts() {
            const sorted = [...healthData].sort((a, b) => new Date(a.date) - new Date(b.date));
            const dates = sorted.map(i => i.date);

            charts.bpChart.setOption({
                title: { text: '血压趋势', left: 'center' },
                tooltip: { trigger: 'axis' },
                legend: { data: ['收缩压', '舒张压'], bottom: 0 },
                xAxis: { data: dates },
                yAxis: { type: 'value', name: 'mmHg' },
                series: [
                    { name: '收缩压', type: 'line', smooth: true, data: sorted.map(i => i.systolic), itemStyle: { color: '#cf1322' } },
                    { name: '舒张压', type: 'line', smooth: true, data: sorted.map(i => i.diastolic), itemStyle: { color: '#1890ff' } }
                ]
            });

            charts.bsChart.setOption({
                title: { text: '血糖趋势', left: 'center' },
                tooltip: { trigger: 'axis' },
                xAxis: { data: dates },
                yAxis: { type: 'value', name: 'mmol/L' },
                series: [{ name: '血糖', type: 'line', smooth: true, data: sorted.map(i => i.bloodSugar), itemStyle: { color: '#fa8c16' } }]
            });

            charts.weightChart.setOption({
                title: { text: '体重变化', left: 'center' },
                tooltip: { trigger: 'axis' },
                xAxis: { data: dates },
                yAxis: { type: 'value', name: '斤' },
                series: [{ name: '体重', type: 'line', smooth: true, data: sorted.map(i => i.weight), itemStyle: { color: '#722ed1' } }]
            });

            charts.sleepChart.setOption({
                title: { text: '睡眠时长', left: 'center' },
                tooltip: { trigger: 'axis' },
                xAxis: { data: dates },
                yAxis: { type: 'value', name: '小时' },
                series: [{ name: '睡眠', type: 'bar', data: sorted.map(i => i.sleep), itemStyle: { color: '#52c41a' } }]
            });

            charts.sportChart.setOption({
                title: { text: '每日运动', left: 'center' },
                tooltip: { trigger: 'axis' },
                xAxis: { data: dates },
                yAxis: { type: 'value', name: '分钟' },
                series: [{ name: '运动', type: 'bar', data: sorted.map(i => i.sport), itemStyle: { color: '#2d8a5f' } }]
            });
        }

        function updateStatistics() {
            document.getElementById('statRecords').textContent = healthData.length;
            if (healthData.length > 0) {
                const avgSystolic = healthData.reduce((sum, d) => sum + d.systolic, 0) / healthData.length;
                const avgDiastolic = healthData.reduce((sum, d) => sum + d.diastolic, 0) / healthData.length;
                const avgSugar = healthData.reduce((sum, d) => sum + d.bloodSugar, 0) / healthData.length;
                const avgSleep = healthData.reduce((sum, d) => sum + d.sleep, 0) / healthData.length;
                
                document.getElementById('statBP').textContent = `${Math.round(avgSystolic)}/${Math.round(avgDiastolic)}`;
                document.getElementById('statSugar').textContent = avgSugar.toFixed(1);
                document.getElementById('statSleep').textContent = avgSleep.toFixed(1) + 'h';
            }
        }

        function updateWarning() {
            const bar = document.getElementById('warningBar');
            const list = document.getElementById('warningList');
            let warnings = [];
            
            healthData.forEach(d => {
                if (d.systolic >= 140) warnings.push({ date: d.date, item: '收缩压', value: d.systolic, threshold: '≥140mmHg' });
                if (d.diastolic >= 90) warnings.push({ date: d.date, item: '舒张压', value: d.diastolic, threshold: '≥90mmHg' });
                if (d.bloodSugar >= 7.0) warnings.push({ date: d.date, item: '血糖', value: d.bloodSugar, threshold: '≥7.0mmol/L' });
                if (d.sleep < 6) warnings.push({ date: d.date, item: '睡眠', value: d.sleep, threshold: '<6 小时' });
            });
            
            if (warnings.length > 0) {
                bar.classList.add('show');
                list.innerHTML = warnings.map(w => `<div class="warning-item"><strong>${w.date}</strong>: ${w.item} ${w.value} (${w.threshold})</div>`).join('');
            } else {
                bar.classList.remove('show');
            }
        }

        function initCharts() {
            charts.bpChart = echarts.init(document.getElementById('bpChart'));
            charts.bsChart = echarts.init(document.getElementById('bsChart'));
            charts.weightChart = echarts.init(document.getElementById('weightChart'));
            charts.sleepChart = echarts.init(document.getElementById('sleepChart'));
            charts.sportChart = echarts.init(document.getElementById('sportChart'));
        }

        window.addEventListener('resize', () => {
            Object.values(charts).forEach(chart => chart.resize());
        });
    </script>
</body>
</html>
