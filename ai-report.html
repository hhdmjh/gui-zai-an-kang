<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桂在安康 - AI 健康建议</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .ai-container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .ai-header {
            background: linear-gradient(135deg, #2d8a5f 0%, #36a88d 100%);
            border-radius: 16px;
            padding: 35px;
            color: white;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .ai-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .ai-subtitle {
            font-size: 16px;
            opacity: 0.95;
        }
        
        .report-card {
            background: white;
            border-radius: 16px;
            padding: 35px;
            margin-bottom: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        
        .report-section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 20px;
            font-weight: bold;
            color: #2d8a5f;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .ai-score {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 30px 0;
        }
        
        .score-item {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            min-width: 150px;
        }
        
        .score-value {
            font-size: 36px;
            font-weight: bold;
            color: #2d8a5f;
            margin-bottom: 8px;
        }
        
        .score-label {
            font-size: 14px;
            color: #666;
        }
        
        .suggestion-item {
            padding: 18px;
            background: #f0f9f4;
            border-left: 4px solid #2d8a5f;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .suggestion-title {
            font-weight: bold;
            color: #2d8a5f;
            margin-bottom: 8px;
            font-size: 16px;
        }
        
        .suggestion-content {
            color: #333;
            line-height: 1.6;
        }
        
        .warning-suggestion {
            background: #fff2f0;
            border-left-color: #cf1322;
        }
        
        .warning-suggestion .suggestion-title {
            color: #cf1322;
        }
        
        .trend-analysis {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .trend-item {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .trend-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .trend-name {
            font-weight: bold;
            color: #333;
        }
        
        .trend-indicator {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .trend-up {
            background: #ffccc7;
            color: #cf1322;
        }
        
        .trend-down {
            background: #b7eb8f;
            color: #52c41a;
        }
        
        .trend-stable {
            background: #d9d9d9;
            color: #666;
        }
        
        .trend-detail {
            font-size: 14px;
            color: #666;
            line-height: 1.8;
        }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: #2d8a5f;
            color: white;
        }
        
        .btn-primary:hover {
            background: #36a88d;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #999;
        }
        
        .spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 4px solid #e0e0e0;
            border-top-color: #2d8a5f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #999;
        }
        
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="home.html" class="navbar-brand">🌿 桂在安康 - 广西社区健康智能检测与预警</a>
        <ul class="navbar-nav">
            <li><a href="home.html" class="nav-link">健康数据</a></li>
            <li><a href="community.html" class="nav-link">社区服务</a></li>
            <li><a href="knowledge.html" class="nav-link">健康知识库</a></li>
            <li><a href="profile.html" class="nav-link">个人中心</a></li>
            <li><button class="nav-btn" id="logoutBtn">退出登录</button></li>
        </ul>
    </nav>

    <div class="container">
        <div class="ai-container">
            <div class="ai-header">
                <div class="ai-title">🤖 AI 健康分析报告</div>
                <div class="ai-subtitle">基于您的健康数据，智能生成个性化健康建议</div>
            </div>

            <div id="loadingReport" class="loading">
                <div class="spinner"></div>
                <p>正在分析您的健康数据...</p>
            </div>

            <div id="reportContent" style="display: none;">
                <!-- 健康评分 -->
                <div class="report-card">
                    <h2 class="section-title">📊 健康综合评分</h2>
                    <div class="ai-score">
                        <div class="score-item">
                            <div class="score-value" id="overallScore">-</div>
                            <div class="score-label">综合评分</div>
                        </div>
                        <div class="score-item">
                            <div class="score-value" id="bpScore">-</div>
                            <div class="score-label">血压健康</div>
                        </div>
                        <div class="score-item">
                            <div class="score-value" id="sugarScore">-</div>
                            <div class="score-label">血糖健康</div>
                        </div>
                        <div class="score-item">
                            <div class="score-value" id="lifestyleScore">-</div>
                            <div class="score-label">生活方式</div>
                        </div>
                    </div>
                </div>

                <!-- 趋势分析 -->
                <div class="report-card">
                    <h2 class="section-title">📈 健康趋势分析</h2>
                    <div class="trend-analysis" id="trendAnalysis"></div>
                </div>

                <!-- 智能建议 -->
                <div class="report-card">
                    <h2 class="section-title">💡 个性化健康建议</h2>
                    <div id="suggestionsList"></div>
                </div>

                <!-- 预警建议 -->
                <div class="report-card" id="warningCard" style="display: none;">
                    <h2 class="section-title">⚠️ 健康预警与建议</h2>
                    <div id="warningSuggestions"></div>
                </div>

                <!-- 操作按钮 -->
                <div class="report-card" style="text-align: center;">
                    <button class="btn btn-primary" onclick="window.print()">🖨️ 打印报告</button>
                    <button class="btn btn-primary" onclick="location.href='home.html'" style="margin-left: 15px;">📝 记录数据</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 纯前端模式
        
        // 检查登录状态
        window.addEventListener('DOMContentLoaded', () => {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if (isLoggedIn !== 'true') {
                window.location.href = 'login.html';
                return;
            }
            
            generateAIReport();
        });

        // 退出登录
        document.getElementById('logoutBtn').onclick = function() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('currentUser');
                window.location.href = 'login.html';
            }
        }

        // 生成 AI 报告
        function generateAIReport() {
            const healthData = JSON.parse(localStorage.getItem('healthData') || '[]');
            
            if (healthData.length === 0) {
                document.getElementById('loadingReport').innerHTML = '<p>暂无健康数据，请先录入数据</p>';
                return;
            }
            
            // 计算健康评分
            const report = calculateHealthScore(healthData);
            displayReport(report);
        }
        
        // 计算健康评分
        function calculateHealthScore(data) {
            let score = 100;
            const latest = data[data.length - 1];
            
            // 血压评分
            if (latest.systolic >= 140) score -= 15;
            if (latest.diastolic >= 90) score -= 10;
            
            // 血糖评分
            if (latest.bloodSugar >= 7.0) score -= 15;
            
            // 睡眠评分
            if (latest.sleep < 6) score -= 10;
            if (latest.sleep > 9) score -= 5;
            
            // 体重评分（简化）
            if (latest.weight >= 110) score -= 5;
            
            return {
                score: Math.max(0, Math.min(100, score)),
                data: latest,
                suggestions: generateSuggestions(latest, score)
            };
        }
        
        // 生成健康建议
        function generateSuggestions(data, score) {
            let suggestions = [];
            
            if (data.systolic >= 140 || data.diastolic >= 90) {
                suggestions.push('⚠️ 血压偏高，建议低盐饮食，定期监测');
            }
            if (data.bloodSugar >= 7.0) {
                suggestions.push('⚠️ 血糖偏高，建议控制糖分摄入');
            }
            if (data.sleep < 6) {
                suggestions.push('😴 睡眠不足，建议早睡早起，保证 7-8 小时睡眠');
            }
            if (data.weight >= 110) {
                suggestions.push('🏃 体重超标，建议适量运动');
            }
            if (score >= 80) {
                suggestions.push('✅ 整体健康状况良好，继续保持！');
            }
            
            return suggestions;
        }
        
        // 显示报告
        function displayReport(report) {
            document.getElementById('loadingReport').style.display = 'none';
            document.getElementById('reportContent').style.display = 'block';
            
            document.getElementById('healthScore').textContent = report.score;
            
            const scoreElement = document.getElementById('healthScore');
            if (report.score >= 80) {
                scoreElement.style.color = '#52c41a';
            } else if (report.score >= 60) {
                scoreElement.style.color = '#fa8c16';
            } else {
                scoreElement.style.color = '#cf1322';
            }
            
            document.getElementById('healthAdvice').innerHTML = report.suggestions.map(s => `<p>${s}</p>`).join('');
        }
                weight: getTrendDirection(firstAvg.weight, secondAvg.weight),
                sport: getTrendDirection(firstAvg.sport, secondAvg.sport)
            };
        }

        function getTrendDirection(first, second) {
            const change = ((second - first) / first) * 100;
            if (Math.abs(change) < 5) return 'stable';
            return change > 0 ? 'up' : 'down';
        }

        // 血压评分
        function calculateBPScore(systolic, diastolic) {
            let score = 100;
            const normalSystolic = 120;
            const normalDiastolic = 80;
            
            score -= Math.abs(systolic - normalSystolic) * 1.5;
            score -= Math.abs(diastolic - normalDiastolic) * 1.5;
            
            return Math.max(0, Math.min(100, Math.round(score)));
        }

        // 血糖评分
        function calculateSugarScore(bloodSugar) {
            let score = 100;
            const normal = 5.6;
            score -= Math.abs(bloodSugar - normal) * 10;
            return Math.max(0, Math.min(100, Math.round(score)));
        }

        // 生活方式评分
        function calculateLifestyleScore(sleep, sport, weight) {
            let score = 100;
            
            // 睡眠评分
            if (sleep < 6 || sleep > 9) score -= 15;
            else if (sleep < 7 || sleep > 8) score -= 5;
            
            // 运动评分
            if (sport < 30) score -= 20;
            else if (sport < 60) score -= 10;
            
            // 体重评分 (简化)
            if (weight > 140 || weight < 90) score -= 15;
            else if (weight > 120 || weight < 100) score -= 5;
            
            return Math.max(0, Math.min(100, Math.round(score)));
        }

        // 生成建议
        function generateSuggestions(avg, latest, trend) {
            const suggestions = [];
            
            // 血压建议
            if (avg.systolic > 130 || avg.diastolic > 85) {
                suggestions.push({
                    title: '🫀 血压管理',
                    content: '您的血压偏高，建议：低盐饮食（每日盐摄入<6g），多吃富含钾的食物（如香蕉、菠菜），保持规律运动，避免情绪激动。'
                });
            }
            
            // 血糖建议
            if (avg.bloodSugar > 6.0) {
                suggestions.push({
                    title: '🍬 血糖控制',
                    content: '您的血糖偏高，建议：控制碳水化合物摄入，选择低 GI 食物，少食多餐，增加膳食纤维，定期监测血糖。'
                });
            }
            
            // 睡眠建议
            if (avg.sleep < 7) {
                suggestions.push({
                    title: '😴 睡眠改善',
                    content: '您的睡眠不足，建议：保持规律作息，睡前避免使用电子设备，营造舒适的睡眠环境，可尝试冥想或深呼吸放松。'
                });
            }
            
            // 运动建议
            if (avg.sport < 30) {
                suggestions.push({
                    title: '🏃 运动建议',
                    content: '您的运动量不足，建议：每天至少进行 30 分钟中等强度运动，如快走、太极拳、游泳等，循序渐进增加运动量。'
                });
            }
            
            // 趋势建议
            if (trend.weight === 'up') {
                suggestions.push({
                    title: '⚖️ 体重管理',
                    content: '您的体重呈上升趋势，建议：控制饮食总热量，增加有氧运动，定期监测体重变化。'
                });
            }
            
            if (suggestions.length === 0) {
                suggestions.push({
                    title: '🎉 健康状况良好',
                    content: '您的各项指标都在正常范围内，请继续保持良好的生活习惯！建议定期体检，保持健康饮食和规律运动。'
                });
            }
            
            return suggestions;
        }

        // 生成预警建议
        function generateWarningSuggestions(latest) {
            const warnings = [];
            
            if (latest.systolic >= 140 || latest.diastolic >= 90) {
                warnings.push({
                    title: '⚠️ 血压偏高',
                    content: `最新血压 ${latest.systolic}/${latest.diastolic} mmHg，已超出正常范围。建议尽快就医咨询，并密切监测血压变化。`
                });
            }
            
            if (latest.bloodSugar >= 7.0) {
                warnings.push({
                    title: '⚠️ 血糖偏高',
                    content: `最新血糖 ${latest.bloodSugar} mmol/L，已达到糖尿病诊断标准。建议尽快就医，进行糖化血红蛋白检测。`
                });
            }
            
            if (latest.sleep < 5) {
                warnings.push({
                    title: '⚠️ 严重睡眠不足',
                    content: `最新睡眠仅 ${latest.sleep} 小时，长期睡眠不足会影响免疫力和心血管健康。建议调整作息，必要时就医咨询。`
                });
            }
            
            return warnings;
        }

        // 显示报告
        function displayReport(report) {
            document.getElementById('loadingReport').style.display = 'none';
            document.getElementById('reportContent').style.display = 'block';
            
            // 显示评分
            document.getElementById('overallScore').textContent = report.scores.overall;
            document.getElementById('bpScore').textContent = report.scores.bp;
            document.getElementById('sugarScore').textContent = report.scores.sugar;
            document.getElementById('lifestyleScore').textContent = report.scores.lifestyle;
            
            // 设置颜色
            setColorByScore('overallScore', report.scores.overall);
            setColorByScore('bpScore', report.scores.bp);
            setColorByScore('sugarScore', report.scores.sugar);
            setColorByScore('lifestyleScore', report.scores.lifestyle);
            
            // 显示趋势分析
            const trendHtml = `
                <div class="trend-item">
                    <div class="trend-header">
                        <span class="trend-name">血压</span>
                        <span class="trend-indicator trend-${report.trend.systolic === 'up' ? 'up' : report.trend.systolic === 'down' ? 'down' : 'stable'}">
                            ${report.trend.systolic === 'up' ? '↑ 上升' : report.trend.systolic === 'down' ? '↓ 下降' : '→ 稳定'}
                        </span>
                    </div>
                    <div class="trend-detail">
                        平均：${Math.round(report.averages.systolic)}/${Math.round(report.averages.diastolic)} mmHg
                    </div>
                </div>
                <div class="trend-item">
                    <div class="trend-header">
                        <span class="trend-name">血糖</span>
                        <span class="trend-indicator trend-${report.trend.bloodSugar === 'up' ? 'up' : report.trend.bloodSugar === 'down' ? 'down' : 'stable'}">
                            ${report.trend.bloodSugar === 'up' ? '↑ 上升' : report.trend.bloodSugar === 'down' ? '↓ 下降' : '→ 稳定'}
                        </span>
                    </div>
                    <div class="trend-detail">
                        平均：${report.averages.bloodSugar.toFixed(1)} mmol/L
                    </div>
                </div>
                <div class="trend-item">
                    <div class="trend-header">
                        <span class="trend-name">睡眠</span>
                        <span class="trend-indicator trend-${report.trend.sleep === 'up' ? 'up' : report.trend.sleep === 'down' ? 'down' : 'stable'}">
                            ${report.trend.sleep === 'up' ? '↑ 增加' : report.trend.sleep === 'down' ? '↓ 减少' : '→ 稳定'}
                        </span>
                    </div>
                    <div class="trend-detail">
                        平均：${report.averages.sleep.toFixed(1)} 小时/天
                    </div>
                </div>
                <div class="trend-item">
                    <div class="trend-header">
                        <span class="trend-name">运动</span>
                        <span class="trend-indicator trend-${report.trend.sport === 'up' ? 'up' : report.trend.sport === 'down' ? 'down' : 'stable'}">
                            ${report.trend.sport === 'up' ? '↑ 增加' : report.trend.sport === 'down' ? '↓ 减少' : '→ 稳定'}
                        </span>
                    </div>
                    <div class="trend-detail">
                        平均：${Math.round(report.averages.sport)} 分钟/天
                    </div>
                </div>
            `;
            document.getElementById('trendAnalysis').innerHTML = trendHtml;
            
            // 显示建议
            const suggestionsHtml = report.suggestions.map(s => `
                <div class="suggestion-item">
                    <div class="suggestion-title">${s.title}</div>
                    <div class="suggestion-content">${s.content}</div>
                </div>
            `).join('');
            document.getElementById('suggestionsList').innerHTML = suggestionsHtml;
            
            // 显示预警建议
            if (report.warningSuggestions.length > 0) {
                document.getElementById('warningCard').style.display = 'block';
                const warningHtml = report.warningSuggestions.map(s => `
                    <div class="suggestion-item warning-suggestion">
                        <div class="suggestion-title">${s.title}</div>
                        <div class="suggestion-content">${s.content}</div>
                    </div>
                `).join('');
                document.getElementById('warningSuggestions').innerHTML = warningHtml;
            }
        }

        function setColorByScore(elementId, score) {
            const element = document.getElementById(elementId);
            if (score >= 80) {
                element.style.color = '#52c41a';
            } else if (score >= 60) {
                element.style.color = '#fa8c16';
            } else {
                element.style.color = '#cf1322';
            }
        }

        function showEmptyState() {
            document.getElementById('loadingReport').style.display = 'none';
            document.getElementById('reportContent').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📊</div>
                    <p>暂无健康数据</p>
                    <p style="margin-top: 10px;">请先记录健康数据，然后生成分析报告</p>
                    <button class="btn btn-primary" onclick="location.href='home.html'" style="margin-top: 20px;">📝 记录数据</button>
                </div>
            `;
        }
    </script>
</body>
</html>
