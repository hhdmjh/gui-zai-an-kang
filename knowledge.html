        let currentCategory = '全部';

        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            renderCategories();
            renderArticles();
        });

        // 渲染分类
        function renderCategories() {
            const categories = ['全部', ...new Set(knowledgeData.map(a => a.category))];
            const tabsHtml = categories.map(cat => 
                `<button class="category-tab ${cat === currentCategory ? 'active' : ''}" 
                          onclick="selectCategory('${cat}')">${cat}</button>`
            ).join('');
            document.getElementById('categoryTabs').innerHTML = tabsHtml;
        }

        // 选择分类
        function selectCategory(category) {
            currentCategory = category;
            renderCategories();
            renderArticles();
        }

        // 渲染文章列表
        function renderArticles() {
            const filtered = currentCategory === '全部' 
                ? knowledgeData 
                : knowledgeData.filter(a => a.category === currentCategory);
            
            const articlesHtml = filtered.map((article, index) => `
                <div class="article-card" onclick="showArticle(${index})">
                    <span class="article-category">${article.category}</span>
                    <h3 class="article-title">${article.title}</h3>
                    <p class="article-excerpt">${article.content.substring(0, 100)}...</p>
                    <div class="article-meta">
                        <span>👨‍⚕️ ${article.author}</span>
                        <span class="article-views">👁 ${article.views}</span>
                    </div>
                </div>
            `).join('');
            document.getElementById('articleGrid').innerHTML = articlesHtml;
        }

        // 显示文章详情
        function showArticle(index) {
            const article = knowledgeData[index];
            document.getElementById('modalTitle').textContent = article.title;
            document.getElementById('modalBody').innerHTML = `
                <p style="margin-bottom: 20px;">
                    <span style="color: #2d8a5f; font-weight: 600;">类别：</span>${article.category}
                    <span style="margin-left: 20px; color: #2d8a5f; font-weight: 600;">作者：</span>${article.author}
                    <span style="margin-left: 20px; color: #2d8a5f; font-weight: 600;">浏览：</span>${article.views}
                </p>
                <div style="line-height: 2; font-size: 16px;">${article.content}</div>
            `;
            document.getElementById('articleModal').classList.add('show');
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('articleModal').classList.remove('show');
        }

        // 点击外部关闭
        document.getElementById('articleModal').addEventListener('click', (e) => {
            if (e.target.id === 'articleModal') {
                closeModal();
            }
        });

        // 退出登录
        document.getElementById('logoutBtn').onclick = function() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('token');
                localStorage.removeItem('currentUser');
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
