<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>功能测试 - 桂在安康</title>
</head>
<body style="padding: 20px; font-family: Arial;">
    <h1>🧪 功能测试页面</h1>
    
    <div style="margin: 20px 0; padding: 20px; background: #f0f9f4; border-radius: 8px;">
        <h2>测试 1: LocalStorage 数据</h2>
        <button onclick="testData()">点击测试数据</button>
        <div id="testResult" style="margin-top: 10px;"></div>
    </div>
    
    <div style="margin: 20px 0; padding: 20px; background: #fff2f0; border-radius: 8px;">
        <h2>测试 2: 重置功能</h2>
        <button onclick="resetTestData()">添加测试数据</button>
        <button onclick="resetTodayData()" style="margin-left: 10px;">重置今日数据</button>
        <button onclick="resetAllData()" style="margin-left: 10px; background: #ff4d4f; color: white;">清空所有数据</button>
        <div id="resetResult" style="margin-top: 10px;"></div>
    </div>
    
    <div style="margin: 20px 0; padding: 20px; background: #f0f5ff; border-radius: 8px;">
        <h2>测试 3: AI 报告</h2>
        <button onclick="testAIReport()">测试 AI 报告计算</button>
        <div id="aiResult" style="margin-top: 10px;"></div>
    </div>
    
    <div style="margin: 20px 0; padding: 20px; background: #fff7e6; border-radius: 8px;">
        <h2>快速链接</h2>
        <a href="index.html" style="margin-right: 10px;">首页</a>
        <a href="login.html" style="margin-right: 10px;">登录</a>
        <a href="home.html" style="margin-right: 10px;">健康数据</a>
        <a href="ai-report.html" style="margin-right: 10px;">AI 报告</a>
        <a href="community.html">社区服务</a>
    </div>
    
    <script>
        // 测试数据
        function testData() {
            const healthData = JSON.parse(localStorage.getItem('healthData') || '[]');
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            
            document.getElementById('testResult').innerHTML = `
                <p>✅ LocalStorage 工作正常</p>
                <p>登录状态：${isLoggedIn || '未登录'}</p>
                <p>健康数据条数：${healthData.length}</p>
                <p>最后一条数据：${healthData.length > 0 ? JSON.stringify(healthData[healthData.length - 1]) : '无'}</p>
            `;
        }
        
        // 添加测试数据
        function resetTestData() {
            const today = new Date().toISOString().split('T')[0];
            const testData = {
                date: today,
                systolic: 150,
                diastolic: 95,
                bloodSugar: 8.5,
                sleep: 5.5,
                weight: 120,
                sport: 30,
                mood: '一般'
            };
            
            let healthData = JSON.parse(localStorage.getItem('healthData') || '[]');
            healthData.push(testData);
            localStorage.setItem('healthData', JSON.stringify(healthData));
            
            document.getElementById('resetResult').innerHTML = `
                <p>✅ 已添加测试数据（高血压、高血糖示例）</p>
                <p>数据：收缩压${testData.systolic}, 舒张压${testData.diastolic}, 血糖${testData.bloodSugar}</p>
            `;
        }
        
        // 重置今日数据
        function resetTodayData() {
            const today = new Date().toISOString().split('T')[0];
            let healthData = JSON.parse(localStorage.getItem('healthData') || '[]');
            const filtered = healthData.filter(item => item.date !== today);
            localStorage.setItem('healthData', JSON.stringify(filtered));
            
            document.getElementById('resetResult').innerHTML += `<p>✅ 今日数据已重置，剩余 ${filtered.length} 条</p>`;
        }
        
        // 清空所有数据
        function resetAllData() {
            if (confirm('确定清空所有数据？')) {
                localStorage.removeItem('healthData');
                document.getElementById('resetResult').innerHTML = '<p>✅ 所有数据已清空</p>';
            }
        }
        
        // 测试 AI 报告
        function testAIReport() {
            const healthData = JSON.parse(localStorage.getItem('healthData') || '[]');
            
            if (healthData.length === 0) {
                document.getElementById('aiResult').innerHTML = '<p style="color: #fa8c16;">⚠️ 暂无数据，请先添加测试数据</p>';
                return;
            }
            
            // 计算健康评分
            let score = 100;
            const latest = healthData[healthData.length - 1];
            
            if (latest.systolic >= 140) score -= 15;
            if (latest.diastolic >= 90) score -= 10;
            if (latest.bloodSugar >= 7.0) score -= 15;
            if (latest.sleep < 6) score -= 10;
            if (latest.weight >= 110) score -= 5;
            
            document.getElementById('aiResult').innerHTML = `
                <p>✅ AI 评分计算正常</p>
                <p>健康评分：<strong style="font-size: 24px; color: ${score >= 80 ? '#52c41a' : score >= 60 ? '#fa8c16' : '#cf1322'}">${score}分</strong></p>
                <p>最新数据：${JSON.stringify(latest)}</p>
                <p><a href="ai-report.html">查看完整 AI 报告 →</a></p>
            `;
        }
    </script>
</body>
</html>
