services:
  - type: web
    name: gui-an-kang-backend
    env: node
    region: singapore
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        value: gui-an-kang-secret-key-2024
    healthCheckPath: /api
