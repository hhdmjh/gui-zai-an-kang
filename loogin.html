<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桂在安康 - 登录</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>🌿 桂在安康</h1>
            <p style="color: #666; margin-bottom: 30px; font-size: 18px;">个人健康监测平台</p>
            
            <div class="input-group">
                <label for="username">用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" autocomplete="off">
            </div>
            
            <div class="input-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码">
            </div>
            
            <button class="login-btn" id="loginBtn">立即登录</button>
            
            <div class="login-tip">
                💡 演示账号：admin / 123456
            </div>
        </div>
    </div>

    <script>
        // 页面加载时检查登录状态
        window.addEventListener('DOMContentLoaded', () => {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if (isLoggedIn === 'true') {
                window.location.href = 'home.html';
            }
            
            // 自动填充演示账号
            document.getElementById('username').value = 'admin';
            document.getElementById('password').value = '123456';
        });

        // 登录逻辑
        document.getElementById('loginBtn').addEventListener('click', handleLogin);

        // 回车登录
        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });

        function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            // 简单验证（演示用，实际项目应连接后端）
            if (username === 'admin' && password === '123456') {
                // 保存登录状态
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('currentUser', username);
                
                // 添加登录成功提示
                showNotification('登录成功！正在跳转...', 'success');
                
                // 延迟跳转
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 800);
            } else {
                showNotification('用户名或密码错误！', 'error');
            }
        }

        // 通知提示函数
        function showNotification(message, type = 'info') {
            // 移除旧的通知
            const oldNotification = document.querySelector('.notification');
            if (oldNotification) {
                oldNotification.remove();
            }
            
            // 创建通知元素
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                padding: 15px 30px;
                border-radius: 10px;
                color: white;
                font-size: 18px;
                font-weight: 600;
                z-index: 9999;
                animation: slideDown 0.3s ease;
                ${type === 'success' ? 'background: #52c41a;' : 'background: #cf1322;'}
            `;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            // 3 秒后移除
            setTimeout(() => {
                notification.style.animation = 'slideUp 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 2000);
        }

        // 添加动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideDown {
                from { opacity: 0; transform: translate(-50%, -20px); }
                to { opacity: 1; transform: translate(-50%, 0); }
            }
            @keyframes slideUp {
                from { opacity: 1; transform: translate(-50%, 0); }
                to { opacity: 0; transform: translate(-50%, -20px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
