<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桂在安康 - 健康数据管理</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .warning-bar {
            display: none;
            background: linear-gradient(135deg, #fff2f0 0%, #ffccc7 100%);
            border: 2px solid #ffccc7;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            animation: slideDown 0.3s ease;
        }
        
        .warning-bar.show {
            display: block;
        }
        
        .warning-bar h3 {
            color: #cf1322;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .warning-item {
            background: white;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #cf1322;
            font-size: 14px;
        }
        
        .warning-item.medium {
            border-left-color: #fa8c16;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        /* 对话框样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .modal-content h2 {
            color: #2d8a5f;
            margin-bottom: 15px;
            font-size: 22px;
        }
        
        .btn-primary {
            background: #2d8a5f;
            color: white;
        }
        
        .btn-primary:hover {
            background: #36a88d;
        }
        
        .mt-20 {
            margin-top: 20px;
        }
        
        .data-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 25px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #f0f9f4 0%, #e6f7ef 100%);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 2px solid #d9f7be;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #2d8a5f;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 14px;
            color: #666;
        }
        
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
        }
        
        .chart-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            height: 350px;
        }
        
        .input-form {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        .form-control {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #2d8a5f;
            box-shadow: 0 0 0 3px rgba(45, 138, 95, 0.1);
        }
        
        .btn-lg {
            padding: 14px 30px;
            font-size: 16px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: #2d8a5f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
            
            .chart-card {
                height: 300px;
            }
            
            .input-form {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="home.html" class="navbar-brand">🌿 桂在安康 - 广西社区健康智能检测与预警</a>
        <ul class="navbar-nav">
            <li><a href="home.html" class="nav-link active">健康数据</a></li>
            <li><a href="contacts.html" class="nav-link">👥 联系人</a></li>
            <li><a href="community.html" class="nav-link">社区服务</a></li>
            <li><a href="knowledge.html" class="nav-link">健康知识库</a></li>
            <li><a href="notifications.html" class="nav-link">📬 消息</a></li>
            <li><a href="profile.html" class="nav-link">个人中心</a></li>
            <li><button class="nav-btn" id="logoutBtn">退出登录</button></li>
        </ul>
    </nav>

    <div class="container" style="max-width: 1200px;">
        <!-- 数据管理和 AI 建议 - 顶部显眼位置 -->
        <div class="card" style="margin-bottom: 25px; background: linear-gradient(135deg, #f0f9f4 0%, #e6f7ef 100%); border: 2px solid #2d8a5f;">
            <h2 class="card-title" style="color: #2d8a5f; font-size: 22px;">⚙️ 数据管理 & AI 健康建议</h2>
            <div style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin-bottom: 15px;">
                <button class="btn btn-primary" onclick="resetTodayData()" style="padding: 14px 30px; font-size: 16px; min-width: 180px;">🔄 重置今日数据</button>
                <button class="btn btn-danger" onclick="resetAllData()" style="padding: 14px 30px; font-size: 16px; min-width: 180px;">🗑️ 清空所有数据</button>
                <button class="btn btn-secondary" onclick="exportData()" style="padding: 14px 30px; font-size: 16px; min-width: 180px;">📥 导出数据</button>
            </div>
            <div style="text-align: center; margin-top: 10px;">
                <button class="btn btn-lg" onclick="generateAIReport()" style="padding: 16px 40px; font-size: 18px; background: linear-gradient(135deg, #722ed1 0%, #a855f7 100%); color: white; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 15px rgba(114, 46, 209, 0.3);">🤖 获取 AI 健康建议</button>
            </div>
        </div>

    
        <div class="warning-bar" id="warningBar">
            <h3>⚠️ 健康预警</h3>
            <div id="warningList"></div>
            <button class="btn btn-primary mt-20" id="notifyBtn" style="display: none;">📤 发送预警通知</button>
        </div>
        
        <!-- 预警通知对话框 -->
        <div id="notifyDialog" class="modal" style="display: none;">
            <div class="modal-content">
                <h2>📤 发送预警通知</h2>
                <p style="margin: 20px 0; color: #666;">
                    将您的异常健康数据推送给紧急联系人
                </p>
                <div class="form-group">
                    <label class="form-label">选择联系人</label>
                    <select id="contactSelect" class="form-control">
                        <option value="">-- 请选择联系人 --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">或添加新联系人</label>
                    <input type="text" id="newContactUsername" class="form-control" placeholder="输入对方用户名">
                </div>
                <div style="display: flex; gap: 15px; justify-content: center; margin-top: 30px;">
                    <button class="btn btn-secondary" onclick="closeNotifyDialog()" style="padding: 10px 30px;">取消</button>
                    <button class="btn btn-primary" onclick="sendNotification()" style="padding: 10px 30px;">✅ 发送通知</button>
                </div>
            </div>
        </div>

        <!-- 数据统计卡片 -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-value" id="statRecords">0</div>
                <div class="stat-label">总记录数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statBP">-</div>
                <div class="stat-label">平均血压</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statSugar">-</div>
                <div class="stat-label">平均血糖</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statSleep">-</div>
                <div class="stat-label">平均睡眠</div>
            </div>
        </div>

        <!-- 数据录入表单 -->
        <div class="card">
            <h2 class="card-title">📝 健康数据录入</h2>
            <form class="input-form" id="dataForm">
                <div class="form-group">
                    <label class="form-label">记录日期</label>
                    <input type="date" id="recordDate" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">收缩压 (mmHg)</label>
                    <input type="number" id="systolic" class="form-control" placeholder="如：120" required>
                </div>
                <div class="form-group">
                    <label class="form-label">舒张压 (mmHg)</label>
                    <input type="number" id="diastolic" class="form-control" placeholder="如：80" required>
                </div>
                <div class="form-group">
                    <label class="form-label">空腹血糖 (mmol/L)</label>
                    <input type="number" id="bloodSugar" class="form-control" placeholder="如：5.6" step="0.1" required>
                </div>
                <div class="form-group">
                    <label class="form-label">睡眠时长 (小时)</label>
                    <input type="number" id="sleep" class="form-control" placeholder="如：7" step="0.5" required>
                </div>
                <div class="form-group">
                    <label class="form-label">体重 (斤)</label>
                    <input type="number" id="weight" class="form-control" placeholder="如：101" step="0.1" required>
                </div>
                <div class="form-group">
                    <label class="form-label">运动时长 (分钟)</label>
                    <input type="number" id="sport" class="form-control" placeholder="如：40" required>
                </div>
                <div style="display: flex; gap: 15px; margin-top: 20px;">
                    <button type="submit" class="btn btn-primary btn-lg" style="flex: 1; font-size: 16px;">✅ 提交数据</button>
                    <button type="button" class="btn btn-danger btn-lg" onclick="resetFormData()" style="min-width: 160px; font-size: 16px;">🔄 重置数据</button>
                </div>
            </form>
        </div>

        <!-- 健康数据图表 -->
        <div class="card">
            <h2 class="card-title">📊 健康数据趋势分析</h2>
            <div style="text-align: center; margin: 20px 0;">
                <button class="btn btn-primary" onclick="showGenerateChartDialog()" style="padding: 12px 30px; font-size: 16px;">📈 生成趋势图表</button>
            </div>
            <div id="loadingChart" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>生成中...</p>
            </div>
            <div class="chart-grid" id="chartGrid" style="display: none;">
                <div id="bpChart" class="chart-card"></div>
                <div id="bsChart" class="chart-card"></div>
                <div id="weightChart" class="chart-card"></div>
                <div id="sleepChart" class="chart-card"></div>
                <div id="sportChart" class="chart-card"></div>
            </div>
        </div>

        <!-- 生成图表确认对话框 -->
        <div id="chartDialog" class="modal" style="display: none;">
            <div class="modal-content">
                <h2>📊 生成趋势图表</h2>
                <p style="margin: 20px 0; color: #666;">
                    将根据您已录入的所有健康数据生成趋势分析图表。<br>
                    包括：血压趋势、血糖趋势、体重变化、睡眠时长、运动时长
                </p>
                <div style="display: flex; gap: 15px; justify-content: center; margin-top: 30px;">
                    <button class="btn btn-secondary" onclick="closeChartDialog()" style="padding: 10px 30px;">取消</button>
                    <button class="btn btn-primary" onclick="generateCharts()" style="padding: 10px 30px;">✅ 确定生成</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 纯前端模式 - 不需要后端
        
        // 检查登录状态
        window.addEventListener('DOMContentLoaded', () => {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if (isLoggedIn !== 'true') {
                window.location.href = 'login.html';
                return;
            }
            
            // 设置默认日期为今天
            document.getElementById('recordDate').valueAsDate = new Date();
            
            // 加载数据
            loadHealthData();
            loadStatistics();
        });

        // 退出登录
        document.getElementById('logoutBtn').onclick = function() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('currentUser');
                window.location.href = 'login.html';
            }
        }

        // 加载统计数据
        function loadStatistics() {
            const healthData = JSON.parse(localStorage.getItem('healthData') || '[]');
            const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
            
            if (!currentUser) return;
            
            const stats = {
                total_records: healthData.length,
                averages: {}
            };
            
            if (healthData.length > 0) {
                // 计算平均值
                const sum = healthData.reduce((acc, item) => {
                    acc.systolic += parseFloat(item.systolic || 0);
                    acc.diastolic += parseFloat(item.diastolic || 0);
                    acc.bloodSugar += parseFloat(item.bloodSugar || item.blood_sugar || 0);
                    acc.sleep += parseFloat(item.sleep || 0);
                    return acc;
                }, { systolic: 0, diastolic: 0, bloodSugar: 0, sleep: 0 });
                
                const count = healthData.length;
                stats.averages.avg_systolic = sum.systolic / count;
                stats.averages.avg_diastolic = sum.diastolic / count;
                stats.averages.avg_blood_sugar = sum.bloodSugar / count;
                stats.averages.avg_sleep = sum.sleep / count;
            }
            
            updateStatistics(stats);
        }

        // 更新统计显示
        function updateStatistics(data) {
            document.getElementById('statRecords').textContent = data.total_records || 0;
            
            if (data.averages) {
                const avgBP = data.averages.avg_systolic && data.averages.avg_diastolic
                    ? `${Math.round(data.averages.avg_systolic)}/${Math.round(data.averages.avg_diastolic)}`
                    : '-';
                document.getElementById('statBP').textContent = avgBP;
                
                document.getElementById('statSugar').textContent = data.averages.avg_blood_sugar
                    ? data.averages.avg_blood_sugar.toFixed(1)
                    : '-';
                    
                document.getElementById('statSleep').textContent = data.averages.avg_sleep
                    ? data.averages.avg_sleep.toFixed(1) + 'h'
                    : '-';
            }
        }

        // 加载健康数据
        let healthData = [];
        let charts = {};

        function loadHealthData() {
            // 从 LocalStorage 加载数据
            healthData = JSON.parse(localStorage.getItem('healthData') || '[]');
            
            if (healthData.length === 0) {
                // 没有数据，隐藏图表
                document.getElementById('loadingChart').style.display = 'none';
                document.getElementById('chartGrid').style.display = 'none';
            } else {
                // 有数据，显示图表
                document.getElementById('loadingChart').style.display = 'none';
                document.getElementById('chartGrid').style.display = 'grid';
                
                initCharts();
                updateCharts();
                updateWarning();
            }
        }

        // 预警判断函数
        function checkWarning(data) {
            let warnings = [];
            
            if (data.systolic >= 140) {
                warnings.push({
                    item: '收缩压',
                    value: data.systolic,
                    threshold: `≥140mmHg`,
                    level: 'high'
                });
            }
            if (data.diastolic >= 90) {
                warnings.push({
                    item: '舒张压',
                    value: data.diastolic,
                    threshold: `≥90mmHg`,
                    level: 'high'
                });
            }
            if (data.bloodSugar >= 7.0) {
                warnings.push({
                    item: '血糖',
                    value: data.bloodSugar,
                    threshold: `≥7.0mmol/L`,
                    level: 'high'
                });
            }
            if (data.sleep < 6) {
                warnings.push({
                    item: '睡眠',
                    value: data.sleep,
                    threshold: `<6 小时`,
                    level: 'medium'
                });
            }
            
            return warnings;
        }

        // 更新预警显示
        function updateWarning() {
            const bar = document.getElementById('warningBar');
            const list = document.getElementById('warningList');
            const notifyBtn = document.getElementById('notifyBtn');
            let allWarnings = [];
            
            healthData.forEach(d => {
                const warnings = checkWarning(d);
                if (warnings.length > 0) {
                    warnings.forEach(w => {
                        allWarnings.push({
                            date: d.date,
                            ...w
                        });
                    });
                }
            });
            
            if (allWarnings.length > 0) {
                bar.classList.add('show');
                notifyBtn.style.display = 'inline-flex';
                list.innerHTML = allWarnings.map(w => 
                    `<div class="warning-item ${w.level}">
                        <strong>${w.date}</strong>：${w.item} ${w.value}（${w.threshold}）
                    </div>`
                ).join('');
            } else {
                bar.classList.remove('show');
                notifyBtn.style.display = 'none';
                list.innerHTML = '';
            }
        }

        // 初始化图表
        function initCharts() {
            charts.bpChart = echarts.init(document.getElementById('bpChart'));
            charts.bsChart = echarts.init(document.getElementById('bsChart'));
            charts.weightChart = echarts.init(document.getElementById('weightChart'));
            charts.sleepChart = echarts.init(document.getElementById('sleepChart'));
            charts.sportChart = echarts.init(document.getElementById('sportChart'));
        }

        // 更新图表
        function updateCharts() {
            // 按日期排序
            const sorted = [...healthData].sort((a, b) => new Date(a.date) - new Date(b.date));
            
            // 格式化日期为易读格式（如：05-05）
            const dates = sorted.map(i => {
                const date = new Date(i.date);
                const month = (date.getMonth() + 1).toString().padStart(2, '0');
                const day = date.getDate().toString().padStart(2, '0');
                return `${month}-${day}`;
            });

            // 血压趋势图
            charts.bpChart.setOption({
                title: { text: '血压趋势', left: 'center', textStyle: { fontSize: 16 } },
                tooltip: { trigger: 'axis' },
                legend: { data: ['收缩压', '舒张压'], bottom: 0 },
                grid: { left: '10%', right: '5%', bottom: '15%', top: '15%' },
                xAxis: { 
                    type: 'category',
                    data: dates, 
                    axisLabel: { 
                        rotate: 45,
                        formatter: function(value) {
                            return '月' + value;
                        }
                    } 
                },
                yAxis: { type: 'value', name: 'mmHg' },
                series: [
                    { name: '收缩压', type: 'line', smooth: true, data: sorted.map(i => i.systolic), itemStyle: { color: '#cf1322' } },
                    { name: '舒张压', type: 'line', smooth: true, data: sorted.map(i => i.diastolic), itemStyle: { color: '#1890ff' } }
                ]
            });

            // 血糖趋势图
            charts.bsChart.setOption({
                title: { text: '血糖趋势', left: 'center', textStyle: { fontSize: 16 } },
                tooltip: { trigger: 'axis' },
                grid: { left: '10%', right: '5%', bottom: '15%', top: '15%' },
                xAxis: { 
                    type: 'category',
                    data: dates, 
                    axisLabel: { 
                        rotate: 45,
                        formatter: function(value) {
                            return '月' + value;
                        }
                    } 
                },
                yAxis: { type: 'value', name: 'mmol/L' },
                series: [{ name: '血糖', type: 'line', smooth: true, data: sorted.map(i => i.bloodSugar), itemStyle: { color: '#fa8c16' } }]
            });

            // 体重趋势图
            charts.weightChart.setOption({
                title: { text: '体重变化', left: 'center', textStyle: { fontSize: 16 } },
                tooltip: { trigger: 'axis' },
                grid: { left: '10%', right: '5%', bottom: '15%', top: '15%' },
                xAxis: { 
                    type: 'category',
                    data: dates, 
                    axisLabel: { 
                        rotate: 45,
                        formatter: function(value) {
                            return '月' + value;
                        }
                    } 
                },
                yAxis: { type: 'value', name: '斤' },
                series: [{ name: '体重', type: 'line', smooth: true, data: sorted.map(i => i.weight), itemStyle: { color: '#722ed1' } }]
            });

            // 睡眠时长图
            charts.sleepChart.setOption({
                title: { text: '睡眠时长', left: 'center', textStyle: { fontSize: 16 } },
                tooltip: { trigger: 'axis' },
                grid: { left: '10%', right: '5%', bottom: '15%', top: '15%' },
                xAxis: { 
                    type: 'category',
                    data: dates, 
                    axisLabel: { 
                        rotate: 45,
                        formatter: function(value) {
                            return '月' + value;
                        }
                    } 
                },
                yAxis: { type: 'value', name: '小时' },
                series: [{ name: '睡眠', type: 'bar', data: sorted.map(i => i.sleep), itemStyle: { color: '#52c41a' } }]
            });

            // 运动时长图
            charts.sportChart.setOption({
                title: { text: '每日运动', left: 'center', textStyle: { fontSize: 16 } },
                tooltip: { trigger: 'axis' },
                grid: { left: '10%', right: '5%', bottom: '15%', top: '15%' },
                xAxis: { 
                    type: 'category',
                    data: dates, 
                    axisLabel: { 
                        rotate: 45,
                        formatter: function(value) {
                            return '月' + value;
                        }
                    } 
                },
                yAxis: { type: 'value', name: '分钟' },
                series: [{ name: '运动', type: 'bar', data: sorted.map(i => i.sport), itemStyle: { color: '#2d8a5f' } }]
            });
        }

        // 提交表单
        document.getElementById('dataForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ 提交中...';
            
            const data = {
                date: document.getElementById('recordDate').value,
                systolic: document.getElementById('systolic').value,
                diastolic: document.getElementById('diastolic').value,
                bloodSugar: document.getElementById('bloodSugar').value,
                sleep: document.getElementById('sleep').value,
                weight: document.getElementById('weight').value,
                sport: document.getElementById('sport').value
            };
            
            // 保存到 LocalStorage
            let healthData = JSON.parse(localStorage.getItem('healthData') || '[]');
            
            // 检查是否已有今天的数据
            const existingIndex = healthData.findIndex(item => item.date === data.date);
            
            const newRecord = {
                date: data.date,
                systolic: data.systolic,
                diastolic: data.diastolic,
                bloodSugar: data.bloodSugar,
                sleep: data.sleep,
                weight: data.weight,
                sport: data.sport,
                createdAt: new Date().toISOString()
            };
            
            if (existingIndex >= 0) {
                // 更新已有数据
                healthData[existingIndex] = newRecord;
            } else {
                // 添加新数据
                healthData.push(newRecord);
            }
            
            localStorage.setItem('healthData', JSON.stringify(healthData));
            
            alert('✅ 数据提交成功！');
            this.reset();
            document.getElementById('recordDate').valueAsDate = new Date();
            loadHealthData();
            loadStatistics();
            
            submitBtn.disabled = false;
            submitBtn.textContent = '✅ 提交数据';
        });

        // 窗口大小改变时自适应
        window.addEventListener('resize', () => {
            Object.values(charts).forEach(chart => chart.resize());
        });

        // 重置表单数据（清空输入框）
        function resetFormData() {
            if (confirm('💝 温馨提醒\n\n您确定要重置当前输入的数据吗？\n\n这将清空您正在填写的表单内容。')) {
                document.getElementById('dataForm').reset();
                document.getElementById('recordDate').valueAsDate = new Date();
                alert('✅ 表单已重置，请重新填写！');
            }
        }

        // 生成 AI 健康建议
        function generateAIReport() {
            // 检查是否有数据
            const token = localStorage.getItem('token');
            if (healthData && healthData.length > 0) {
                // 有数据，直接跳转
                window.location.href = 'ai-report.html';
            } else {
                // 暂无数据，提示用户
                if (confirm('您还没有健康数据记录，是否先去录入数据？')) {
                    // 用户选择是，不做任何操作，留在当前页面
                } else {
                    // 用户选择否，仍然跳转到 AI 报告页面（可能之前有数据）
                    window.location.href = 'ai-report.html';
                }
            }
        }

        // 重置今日数据
        async function resetTodayData() {
            if (!confirm('确定要重置今日数据吗？此操作不可恢复！')) {
                return;
            }
            
            const today = new Date().toISOString().split('T')[0];
            const token = localStorage.getItem('token');
            
            try {
                const response = await fetch(`${API_BASE_URL}/health-data/today`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const result = await response.json();
                if (result.success && result.data && result.data.length > 0) {
                    // 删除今日所有记录
                    for (const record of result.data) {
                        await fetch(`${API_BASE_URL}/health-data/${record.id}`, {
                            method: 'DELETE',
                            headers: {
                                'Authorization': `Bearer ${token}`
                            }
                        });
                    }
                    
                    alert('✅ 今日数据已重置！请重新录入数据。');
                    // 清空健康数据数组
                    healthData = [];
                    // 重新加载数据（会是空数据）
                    loadHealthData();
                    loadStatistics();
                } else {
                    alert('ℹ️ 今日暂无数据记录');
                }
            } catch (error) {
                console.error('重置失败:', error);
                alert('❌ 重置失败，请重试');
            }
        }

        // 清空所有数据
        async function resetAllData() {
            if (!confirm('⚠️ 警告：确定要清空所有健康数据吗？此操作不可恢复！\n\n点击"确定"删除所有数据，点击"取消"保留数据。')) {
                return;
            }
            
            const token = localStorage.getItem('token');
            
            try {
                // 使用批量删除 API
                const response = await fetch(`${API_BASE_URL}/health-data`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const result = await response.json();
                if (result.success) {
                    alert(`✅ 已成功删除所有数据！请重新录入数据。`);
                    // 清空健康数据数组
                    healthData = [];
                    // 重新加载数据（会是空数据）
                    loadHealthData();
                    loadStatistics();
                } else {
                    alert('ℹ️ 暂无数据可删除');
                }
            } catch (error) {
                console.error('清空失败:', error);
                alert('❌ 清空失败，请重试');
            }
        }

        // 导出数据
        async function exportData() {
            const token = localStorage.getItem('token');
            
            try {
                const response = await fetch(`${API_BASE_URL}/health-data`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const result = await response.json();
                if (result.success && result.data && result.data.length > 0) {
                    let csvContent = '日期，收缩压，舒张压，血糖，睡眠，体重，运动\n';
                    
                    result.data.forEach(row => {
                        csvContent += `${row.record_date},${row.systolic},${row.diastolic},${row.blood_sugar},${row.sleep},${row.weight},${row.sport}\n`;
                    });
                    
                    const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
                    const link = document.createElement('a');
                    const url = URL.createObjectURL(blob);
                    
                    link.setAttribute('href', url);
                    link.setAttribute('download', `健康数据_${new Date().toISOString().split('T')[0]}.csv`);
                    link.style.visibility = 'hidden';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    alert(`✅ 已导出 ${result.data.length} 条记录！`);
                } else {
                    alert('ℹ️ 暂无数据可导出');
                }
            } catch (error) {
                console.error('导出失败:', error);
                alert('❌ 导出失败，请重试');
            }
        }

        // 显示生成图表对话框
        function showGenerateChartDialog() {
            if (healthData.length === 0) {
                alert('ℹ️ 您还没有健康数据，请先录入数据后再来生成图表！');
                return;
            }
            document.getElementById('chartDialog').style.display = 'flex';
        }

        // 关闭图表对话框
        function closeChartDialog() {
            document.getElementById('chartDialog').style.display = 'none';
        }

        // 生成图表
        function generateCharts() {
            closeChartDialog();
            
            // 显示加载动画
            document.getElementById('loadingChart').style.display = 'block';
            document.getElementById('chartGrid').style.display = 'none';
            
            setTimeout(() => {
                updateCharts();
                document.getElementById('loadingChart').style.display = 'none';
                document.getElementById('chartGrid').style.display = 'grid';
            }, 500);
        }
        
        // ==================== 预警通知功能 ====================
        
        // 显示预警通知对话框
        document.getElementById('notifyBtn').onclick = function() {
            loadContacts();
            document.getElementById('notifyDialog').style.display = 'flex';
        };
        
        // 关闭预警通知对话框
        function closeNotifyDialog() {
            document.getElementById('notifyDialog').style.display = 'none';
        }
        
        // 加载联系人列表
        async function loadContacts() {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`${API_BASE_URL}/contacts`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const result = await response.json();
                const select = document.getElementById('contactSelect');
                select.innerHTML = '<option value="">-- 请选择联系人 --</option>';
                
                if (result.success && result.data.length > 0) {
                    result.data.forEach(contact => {
                        const option = document.createElement('option');
                        option.value = contact.contact_username;
                        option.textContent = contact.contact_username + (contact.relation ? ` (${contact.relation})` : '');
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('加载联系人失败:', error);
            }
        }
        
        // 发送预警通知
        async function sendNotification() {
            const contactUsername = document.getElementById('contactSelect').value;
            const newContactUsername = document.getElementById('newContactUsername').value.trim();
            
            if (!contactUsername && !newContactUsername) {
                alert('❌ 请选择联系人或输入新联系人用户名');
                return;
            }
            
            const targetUsername = contactUsername || newContactUsername;
            const token = localStorage.getItem('token');
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            
            // 获取最新的异常数据（只检测血压、血糖、睡眠）
            const abnormalData = healthData.filter(item => {
                return item.systolic >= 140 || item.diastolic >= 90 || 
                       item.bloodSugar >= 6.1 || item.sleep < 6;
            });
            
            if (abnormalData.length === 0) {
                alert('ℹ️ 暂无异常数据需要推送');
                closeNotifyDialog();
                return;
            }
            
            try {
                // 如果是新联系人，先添加
                if (!contactUsername && newContactUsername) {
                    await fetch(`${API_BASE_URL}/contacts`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            contact_username: newContactUsername,
                            relation: '紧急联系人'
                        })
                    });
                }
                
                // 发送通知
                const response = await fetch(`${API_BASE_URL}/notifications`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        to_username: targetUsername,
                        type: 'health_warning',
                        title: '健康预警通知',
                        message: `用户 ${currentUser.username} 的 health 数据出现异常，请及时查看！`,
                        data: {
                            warnings: abnormalData.slice(-5) // 最近 5 条异常数据
                        }
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert(`✅ 预警通知已发送给 ${targetUsername}！`);
                    closeNotifyDialog();
                } else {
                    alert('❌ 发送失败：' + result.message);
                }
            } catch (error) {
                console.error('发送通知失败:', error);
                alert('❌ 发送失败，请重试');
            }
        }
    </script>
</body>
