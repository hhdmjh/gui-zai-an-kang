<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桂在安康 - 个人中心</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .profile-header {
            background: linear-gradient(135deg, #2d8a5f 0%, #36a88d 100%);
            border-radius: 16px;
            padding: 40px;
            color: white;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto 20px;
            border: 4px solid rgba(255, 255, 255, 0.3);
        }
        
        .profile-name {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .profile-role {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .profile-section {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        
        .section-title {
            font-size: 20px;
            font-weight: bold;
            color: #2d8a5f;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .profile-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group.full-width {
            grid-column: 1 / -1;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        .form-control {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #2d8a5f;
            box-shadow: 0 0 0 3px rgba(45, 138, 95, 0.1);
        }
        
        .form-control:disabled {
            background: #f5f5f5;
            cursor: not-allowed;
        }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: #2d8a5f;
            color: white;
        }
        
        .btn-primary:hover {
            background: #36a88d;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .btn-danger {
            background: #cf1322;
            color: white;
        }
        
        .btn-danger:hover {
            background: #d9363e;
        }
        
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .info-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #2d8a5f;
        }
        
        .info-label {
            font-size: 13px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .info-value {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .message.success {
            background: #f6ffed;
            border: 1px solid #b7eb8f;
            color: #52c41a;
        }
        
        .message.error {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #cf1322;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #e0e0e0;
            border-top-color: #2d8a5f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="home.html" class="navbar-brand">🌿 桂在安康 - 广西社区健康智能检测与预警</a>
        <ul class="navbar-nav">
            <li><a href="home.html" class="nav-link">健康数据</a></li>
            <li><a href="contacts.html" class="nav-link">👥 联系人</a></li>
            <li><a href="community.html" class="nav-link">社区服务</a></li>
            <li><a href="knowledge.html" class="nav-link">健康知识库</a></li>
            <li><a href="notifications.html" class="nav-link">📬 消息</a></li>
            <li><a href="profile.html" class="nav-link active">个人中心</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="profile-container">
            <!-- 用户信息头部 -->
            <div class="profile-header">
                <div class="profile-avatar">👤</div>
                <div class="profile-name" id="profileName">-</div>
                <div class="profile-role" id="profileRole">-</div>
            </div>

            <!-- 基本信息 -->
            <div class="profile-section">
                <h2 class="section-title">📋 基本信息</h2>
                <div id="loadingInfo" class="loading">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>
                <div id="profileInfo" style="display: none;">
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">用户名</div>
                            <div class="info-value" id="infoUsername">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">真实姓名</div>
                            <div class="info-value" id="infoRealName">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">手机号</div>
                            <div class="info-value" id="infoPhone">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">邮箱</div>
                            <div class="info-value" id="infoEmail">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">性别</div>
                            <div class="info-value" id="infoGender">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">年龄</div>
                            <div class="info-value" id="infoAge">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">注册时间</div>
                            <div class="info-value" id="infoCreatedAt">-</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 编辑资料 -->
            <div class="profile-section">
                <h2 class="section-title">✏️ 编辑资料</h2>
                <div id="message" class="message"></div>
                <form id="profileForm" class="profile-form">
                    <div class="form-group">
                        <label class="form-label">真实姓名</label>
                        <input type="text" id="editRealName" class="form-control" placeholder="选填">
                    </div>
                    <div class="form-group">
                        <label class="form-label">手机号</label>
                        <input type="tel" id="editPhone" class="form-control" placeholder="选填">
                    </div>
                    <div class="form-group">
                        <label class="form-label">邮箱</label>
                        <input type="email" id="editEmail" class="form-control" placeholder="选填">
                    </div>
                    <div class="form-group">
                        <label class="form-label">性别</label>
                        <select id="editGender" class="form-control">
                            <option value="">请选择</option>
                            <option value="male">男</option>
                            <option value="female">女</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">年龄</label>
                        <input type="number" id="editAge" class="form-control" placeholder="岁" min="1" max="150">
                    </div>
                    <div class="form-group full-width">
                        <div class="btn-group">
                            <button type="submit" class="btn btn-primary">💾 保存修改</button>
                            <button type="button" class="btn btn-secondary" onclick="resetForm()">重置</button>
                        </div>
                    </div>
                </form>
            </div>

            <!-- 修改密码 -->
            <div class="profile-section">
                <h2 class="section-title">🔐 修改密码</h2>
                <form id="passwordForm" class="profile-form">
                    <div class="form-group">
                        <label class="form-label">原密码</label>
                        <input type="password" id="oldPassword" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">新密码</label>
                        <input type="password" id="newPassword" class="form-control" placeholder="至少 6 位" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">确认新密码</label>
                        <input type="password" id="confirmPassword" class="form-control" required>
                    </div>
                    <div class="form-group full-width">
                        <button type="submit" class="btn btn-primary">🔑 修改密码</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000/api';
        
        // 检查登录状态
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }
            
            loadUserProfile();
        });

        // 加载用户信息
        async function loadUserProfile() {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`${API_BASE_URL}/user/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const result = await response.json();
                if (result.success) {
                    displayUserProfile(result.data);
                    document.getElementById('loadingInfo').style.display = 'none';
                    document.getElementById('profileInfo').style.display = 'block';
                }
            } catch (error) {
                console.error('加载用户信息失败:', error);
                showMessage('加载失败，请刷新重试', 'error');
            }
        }

        // 显示用户信息
        function displayUserProfile(user) {
            document.getElementById('profileName').textContent = user.real_name || user.username;
            document.getElementById('profileRole').textContent = user.role === 'admin' ? '管理员' : '普通会员';
            
            document.getElementById('infoUsername').textContent = user.username;
            document.getElementById('infoRealName').textContent = user.real_name || '-';
            document.getElementById('infoPhone').textContent = user.phone || '-';
            document.getElementById('infoEmail').textContent = user.email || '-';
            document.getElementById('infoGender').textContent = user.gender === 'male' ? '男' : user.gender === 'female' ? '女' : '-';
            document.getElementById('infoAge').textContent = user.age || '-';
            document.getElementById('infoCreatedAt').textContent = new Date(user.created_at).toLocaleDateString('zh-CN');
            
            // 填充表单
            document.getElementById('editRealName').value = user.real_name || '';
            document.getElementById('editPhone').value = user.phone || '';
            document.getElementById('editEmail').value = user.email || '';
            document.getElementById('editGender').value = user.gender || '';
            document.getElementById('editAge').value = user.age || '';
        }

        // 保存资料
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const token = localStorage.getItem('token');
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = '保存中...';
            
            const data = {
                real_name: document.getElementById('editRealName').value,
                phone: document.getElementById('editPhone').value,
                email: document.getElementById('editEmail').value,
                gender: document.getElementById('editGender').value,
                age: document.getElementById('editAge').value ? parseInt(document.getElementById('editAge').value) : null
            };
            
            try {
                const response = await fetch(`${API_BASE_URL}/user/me`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                if (result.success) {
                    showMessage('修改成功！', 'success');
                    loadUserProfile();
                } else {
                    showMessage(result.message || '修改失败', 'error');
                }
            } catch (error) {
                console.error('修改失败:', error);
                showMessage('网络错误，请重试', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '💾 保存修改';
            }
        });

        // 修改密码
        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (newPassword !== confirmPassword) {
                showMessage('两次输入的新密码不一致', 'error');
                return;
            }
            
            if (newPassword.length < 6) {
                showMessage('密码长度至少 6 位', 'error');
                return;
            }
            
            const token = localStorage.getItem('token');
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = '修改中...';
            
            const data = {
                oldPassword: document.getElementById('oldPassword').value,
                newPassword: newPassword
            };
            
            try {
                const response = await fetch(`${API_BASE_URL}/user/change-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                if (result.success) {
                    showMessage('密码修改成功！', 'success');
                    e.target.reset();
                } else {
                    showMessage(result.message || '修改失败', 'error');
                }
            } catch (error) {
                console.error('修改失败:', error);
                showMessage('网络错误，请重试', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '🔑 修改密码';
            }
        });

        // 显示消息
        function showMessage(message, type) {
            const msgEl = document.getElementById('message');
            msgEl.textContent = message;
            msgEl.className = `message ${type}`;
            msgEl.style.display = 'block';
            
            setTimeout(() => {
                msgEl.style.display = 'none';
            }, 3000);
        }

        // 重置表单
        function resetForm() {
            loadUserProfile();
        }
    </script>
</body>
</html>
