<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试 - 桂在安康</title>
</head>
<body>
    <h1>✅ 如果您看到这个页面，说明 GitHub Pages 已更新！</h1>
    <p>当前时间：<span id="time"></span></p>
    <p>localStorage 测试：<button onclick="testLocalStorage()">点击测试</button></p>
    <div id="result"></div>
    
    <script>
        document.getElementById('time').textContent = new Date().toLocaleString('zh-CN');
        
        function testLocalStorage() {
            localStorage.setItem('test', '纯前端模式已启用');
            const result = localStorage.getItem('test');
            document.getElementById('result').innerHTML = '<h2>✅ LocalStorage 工作正常！</h2><p>测试数据：' + result + '</p>';
        }
    </script>
</body>
</html>
